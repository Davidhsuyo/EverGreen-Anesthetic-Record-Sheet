<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evergreen 獸醫麻醉紀錄表</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 10px; background-color: #d1d5db; margin-bottom: 50px; }
        .app-container { width: 100%; max-width: 1600px; margin: auto; }
        * { box-sizing: border-box; }
        .input-panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; width: 80px; }
        .input-group label { font-size: 11px; font-weight: bold; color: #4a5568; margin-bottom: 4px; white-space: nowrap; }
        .input-group input, .input-group select { padding: 6px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 13px; text-align: center; }
        .time-group { width: 130px !important; }
        .time-group input { background-color: #fffaf0; border: 1px solid #f6ad55; font-weight: bold; }
        .fluid-group { width: 140px !important; }
        .fluid-inputs { display: flex; gap: 4px; }
        .btn-add { background-color: #2b6cb0; color: white; border: none; border-radius: 4px; padding: 0 20px; font-weight: bold; cursor: pointer; height: 42px; margin-left: auto; }
        .ucd-form-container { background: white; border: 3px solid #000; display: flex; flex-direction: column; width: 100%; }
        .ucd-top-info { padding: 10px 15px; border-bottom: 2px solid #000; }
        .header-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; }
        .info-line { display: flex; align-items: flex-end; margin-bottom: 4px; }
        .info-line input { border: none; border-bottom: 1px solid #718096; flex-grow: 1; outline: none; padding-left: 5px; font-weight: bold; }
        .center-title { text-align: center; }
        .section-divider { background-color: #edf2f7; padding: 4px 8px; font-weight: bold; border-left: 4px solid #4a5568; margin: 10px 0 5px 0; font-size: 13px; }
        .record-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .record-table th, .record-table td { border: 1px solid #718096; text-align: center; font-size: 11px; height: 22px; }
        .row-header { width: 85px; background-color: #edf2f7; font-weight: bold; border-right: 2px solid #000; }
        .chart-wrapper { width: 100%; border-top: 2px solid #000; border-bottom: 2px solid #000; background-color: #fff; }
        canvas { display: block; width: 100%; height: 350px !important; }
        @media print {
            .input-panel, .btn-add { display: none !important; }
            body { background-color: white; padding: 0; }
            @page { size: A3 landscape; margin: 10mm; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="input-panel">
        <div class="input-group time-group"><label>紀錄時間</label><input type="time" id="record-time"></div>
        <div class="input-group"><label>Anes %</label><input type="text" id="anes"></div>
        <div class="input-group"><label>SpO2</label><input type="number" id="spo2"></div>
        <div class="input-group"><label>Pulse (•)</label><input type="number" id="pulse"></div>
        <div class="input-group"><label>Sys BP (V)</label><input type="number" id="sysBP"></div>
        <div class="input-group"><label>Dia BP (^)</label><input type="number" id="diaBP"></div>
        <div class="input-group fluid-group">
            <label>Fluids</label>
            <div class="fluid-inputs">
                <select id="fluid-type"><option>LRS</option><option>NaCl</option></select>
                <input type="number" id="fluids" style="width:60px">
            </div>
        </div>
        <button class="btn-add" onclick="addRecord()">填入下方網格 ⬇</button>
    </div>

    <div class="ucd-form-container">
        <div class="ucd-top-info">
            <div class="header-grid">
                <div class="info-col">
                    <div class="info-line"><span>ID #:</span><input type="text"></div>
                    <div class="info-line"><span>Weight(kg):</span><input type="number" id="patient-weight"></div>
                </div>
                <div class="center-title">
                    <div style="font-size: 22px; font-weight: bold;">Evergreen</div>
                    <div style="font-size: 14px;">Evergreen Veterinary Services</div>
                    <div style="font-size: 24px; font-weight: bold; text-decoration: underline;">Anesthesia Record</div>
                </div>
                <div class="info-col">
                    <div class="info-line"><span>Date:</span><input type="date"></div>
                    <div class="info-line"><span>Anesthetist:</span><input type="text"></div>
                </div>
            </div>
        </div>

        <div class="ucd-grid-area">
            <table class="record-table" id="topTable">
                <tr id="row-time"><td class="row-header">Time</td></tr>
                <tr id="row-anes"><td class="row-header">Anesthetic</td></tr>
                <tr id="row-spo2"><td class="row-header">SpO2</td></tr>
            </table>
            <div class="chart-wrapper"><canvas id="anesthesiaChart"></canvas></div>
            <table class="record-table" id="bottomTable">
                <tr id="row-fluids"><td class="row-header">Fluids</td></tr>
            </table>
        </div>
    </div>
    <div style="text-align:center; margin-top:20px;">
        <button style="padding:10px 30px; cursor:pointer;" onclick="window.print()">📄 列印 / 另存 PDF</button>
    </div>
</div>

<script>
    const MAX_SLOTS = 30;
    let currentSlotIndex = 0;
    function initTables() {
        ['row-time', 'row-anes', 'row-spo2', 'row-fluids'].forEach(id => {
            const tr = document.getElementById(id);
            for(let i=0; i<MAX_SLOTS; i++) { tr.innerHTML += `<td id="${id}-${i}"></td>`; }
        });
    }
    initTables();

    const ctx = document.getElementById('anesthesiaChart').getContext('2d');
    const anesthesiaChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(MAX_SLOTS).fill(''),
            datasets: [
                { label: 'Pulse', data: Array(MAX_SLOTS).fill(null), borderColor: 'red', pointStyle: 'circle' },
                { label: 'Sys BP', data: Array(MAX_SLOTS).fill(null), borderColor: 'blue', pointStyle: 'triangle', showLine: false }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
                y: { min: 0, max: 300, ticks: { stepSize: 20 }, grid: { color: '#e2e8f0' } },
                x: { ticks: { display: false }, grid: { color: '#e2e8f0' } }
            },
            plugins: { legend: { display: false } }
        }
    });

    window.onload = () => {
        const now = new Date();
        document.getElementById('record-time').value = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    };

    function addRecord() {
        if (currentSlotIndex >= MAX_SLOTS) return;
        const timeVal = document.getElementById('record-time').value;
        document.getElementById(`row-time-${currentSlotIndex}`).textContent = timeVal;
        document.getElementById(`row-anes-${currentSlotIndex}`).textContent = document.getElementById('anes').value || '-';
        document.getElementById(`row-spo2-${currentSlotIndex}`).textContent = document.getElementById('spo2').value || '-';
        
        const pulse = document.getElementById('pulse').value;
        if(pulse) anesthesiaChart.data.datasets[0].data[currentSlotIndex] = Number(pulse);
        anesthesiaChart.update();
        currentSlotIndex++;

        const [h, m] = timeVal.split(':').map(Number);
        const next = new Date(); next.setHours(h); next.setMinutes(m + 5);
        document.getElementById('record-time').value = String(next.getHours()).padStart(2,'0')+':'+String(next.getMinutes()).padStart(2,'0');
    }
</script>
</body>
</html>
